syntax = "proto3";

package fraud_detection;

message VectorClock {
  repeated int32 clock = 1; 
}

message InitOrderRequest {
  string order_id = 1;
  string order_json = 2;
  VectorClock vc = 3;
}

message InitOrderResponse {
  bool ok = 1;
  string message = 2;
  VectorClock vc = 3;
}

message EventRequest {
  string order_id = 1;
  VectorClock vc = 2;
}

message EventResponse {
  bool ok = 1;        
  string reason = 2; 
  VectorClock vc = 3; 
}

service FraudDetectionService {
  rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);

  rpc CheckUserFraud (EventRequest) returns (EventResponse);

  rpc CheckCardFraud (EventRequest) returns (EventResponse);
}