syntax = "proto3";

package suggestions;

service SuggestionsService {
  rpc InitializeOrder (OrderInitializationRequest) returns (OrderInitializationResponse);
  rpc GenerateSuggestions (OrderEventRequest) returns (SuggestionsEventResponse);
  rpc ClearOrder (OrderClearRequest) returns (OrderClearResponse);
  rpc GetSuggestions (SuggestionsRequest) returns (SuggestionsResponse);
}

message SuggestionsRequest {
  string order_json = 1;
}

message OrderInitializationRequest {
  string order_id = 1;
  string order_json = 2;
  map<string, int32> vector_clock = 3;
}

message OrderInitializationResponse {
  bool accepted = 1;
  string reason = 2;
  map<string, int32> vector_clock = 3;
}

message OrderEventRequest {
  string order_id = 1;
  map<string, int32> vector_clock = 2;
}

message OrderClearRequest {
  string order_id = 1;
  map<string, int32> final_vector_clock = 2;
}

message OrderClearResponse {
  bool cleared = 1;
  string reason = 2;
  map<string, int32> vector_clock = 3;
}

message Book {
  string book_id = 1;
  string title = 2;
  string author = 3;
}

message SuggestionsEventResponse {
  bool success = 1;
  string reason = 2;
  string event_name = 3;
  map<string, int32> vector_clock = 4;
  repeated Book books = 5;
}

message SuggestionsResponse {
  repeated Book books = 1;
}
