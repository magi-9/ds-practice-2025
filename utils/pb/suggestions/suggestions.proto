syntax = "proto3";

package suggestions;

message VectorClock {
  repeated int32 clock = 1; 
}

message InitOrderRequest {
  string order_id = 1;
  string order_json = 2;
  VectorClock vc = 3;
}

message InitOrderResponse {
  bool ok = 1;
  string message = 2;
  VectorClock vc = 3;
}

message EventRequest {
  string order_id = 1;
  VectorClock vc = 2;
}

message Book {
  string book_id = 1;
  string title = 2;
  string author = 3;
}

message SuggestionsResponse {
  bool ok = 1;
  string reason = 2;
  VectorClock vc = 3;
  repeated Book books = 4;
}

service SuggestionsService {
  rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);

  rpc GetSuggestions (EventRequest) returns (SuggestionsResponse);
}
